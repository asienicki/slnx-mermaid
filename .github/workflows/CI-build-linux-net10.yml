name: CI-build-linux-net10

on:
  workflow_call:
    inputs:
      dotnet_version:
        type: string
        default: 10.0.x

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore
        run: dotnet restore SlnxMermaid.slnx

      - name: Build
        run: dotnet build SlnxMermaid.slnx --no-restore

      - name: Verify generated configuration schema is committed
        run: git diff --exit-code -- schemas/slnx-mermaid.schema.json

      - name: Test (xUnit)
        run: |
          dotnet test SlnxMermaid.slnx \
            --no-build \
            --logger "trx;LogFileName=test-results.trx"

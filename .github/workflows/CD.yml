name: CD

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        required: true
        default: both
        type: choice
        options:
          - rc
          - prod
          - both
      deploy_docs:
        description: "Deploy docs pages"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  CD-version:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      VSIX_BASE_VERSION: 17.1.0
    steps:
      - name: Calculate shared version
        id: version
        run: |
          set -euo pipefail

          if ! [[ "$VSIX_BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Bad VSIX_BASE_VERSION: $VSIX_BASE_VERSION"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$VSIX_BASE_VERSION"

          yy=$(date +%y)
          doy=$(date +%j)
          run=$((GITHUB_RUN_NUMBER % 1000))
          revision=$((10#$yy * 1000000 + 10#$doy * 1000 + run))

          version="$major.$minor.$patch.$revision"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Shared release version: $version"

  CD-nuget-rc:
    needs: CD-version
    if: github.ref == 'refs/heads/master' && (inputs.release_channel == 'rc' || inputs.release_channel == 'both')
    uses: ./.github/workflows/CD-common-nuget.yml
    with:
      channel: rc
      version: ${{ needs.CD-version.outputs.version }}
    secrets: inherit

  CD-vsix-rc:
    needs: CD-version
    if: github.ref == 'refs/heads/master' && (inputs.release_channel == 'rc' || inputs.release_channel == 'both')
    uses: ./.github/workflows/CD-common-vsix.yml
    with:
      channel: rc
      version: ${{ needs.CD-version.outputs.version }}
    secrets: inherit

  CD-nuget-prod:
    needs: CD-version
    if: github.ref == 'refs/heads/master' && (inputs.release_channel == 'prod' || inputs.release_channel == 'both')
    uses: ./.github/workflows/CD-common-nuget.yml
    with:
      channel: prod
      version: ${{ needs.CD-version.outputs.version }}
    secrets: inherit

  CD-vsix-prod:
    needs: CD-version
    if: github.ref == 'refs/heads/master' && (inputs.release_channel == 'prod' || inputs.release_channel == 'both')
    uses: ./.github/workflows/CD-common-vsix.yml
    with:
      channel: prod
      version: ${{ needs.CD-version.outputs.version }}
    secrets: inherit

  CD-docs-pages:
    if: github.ref == 'refs/heads/master' && inputs.deploy_docs == true
    uses: ./.github/workflows/CD-docs-pages.yml

  CD-tag:
    needs:
      - CD-version
      - CD-nuget-rc
      - CD-vsix-rc
      - CD-nuget-prod
      - CD-vsix-prod
      - CD-docs-pages
    if: |
      always() &&
      github.ref == 'refs/heads/master' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create release tag
        run: |
          set -euo pipefail

          TAG="v${{ needs.CD-version.outputs.version }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

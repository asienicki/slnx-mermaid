name: CI-yaml-configuration-validator

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: "3.x"

concurrency:
  group: yaml-configuration-validator-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-configuration-validator:
    name: Validate YAML configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install validation dependencies
        run: python -m pip install --upgrade jsonschema pyyaml

      - name: Validate sample YAML against schema and coverage rules
        run: python .github/scripts/validate-sample-configuration.py

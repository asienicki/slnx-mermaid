name: CD-common-nuget

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build SlnxMermaid.slnx -c Release /p:Version=${{ inputs.version }}

      - name: Test
        run: dotnet test SlnxMermaid.slnx -c Release --no-build /p:Version=${{ inputs.version }}

      - name: Pack CLI only
        run: |
          dotnet pack src/SlnxMermaid.CLI/SlnxMermaid.CLI.csproj \
            -c Release \
            --no-build \
            /p:Version=${{ inputs.version }} \
            -o ./nupkg

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

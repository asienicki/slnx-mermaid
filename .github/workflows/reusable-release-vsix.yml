name: Reusable VSIX Release

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

jobs:
  versioning:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      VSIX_BASE_VERSION: 17.1.0

    steps:
      - uses: actions/checkout@v4

      - name: Calculate VSIX version
        id: version
        shell: pwsh
        run: |
          if ($env:VSIX_BASE_VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "Bad VSIX_BASE_VERSION"
          }

          $now = Get-Date
          $yy  = $now.Year % 100
          $doy = $now.DayOfYear
          $run = [int]$env:GITHUB_RUN_NUMBER

          $run3 = $run % 1000
          $revision = ($yy * 1000000) + ($doy * 1000) + $run3

          $version = "$env:VSIX_BASE_VERSION.$revision"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "Version: $version"

  build:
    needs: versioning
    runs-on: windows-latest

    env:
      VS_MARKETPLACE_PUBLISHER_ID: SharpCode
      VS_MARKETPLACE_AUTHOR_DISPLAY_NAME: "Sharp Code"

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - name: Patch VSIX manifest (RC)
        if: inputs.channel == 'rc'
        shell: pwsh
        env:
          VSIX_ID_RC: "{1f7cdd6e-e9f7-4562-826f-24843b73f471}"
          VSIX_DISPLAY_NAME_RC: "Slnx Mermaid (RC)"
        run: |
          $ErrorActionPreference = 'Stop'

          $manifestPath = "src/SlnxMermaidVsix/source.extension.vsixmanifest"
          if (-not (Test-Path $manifestPath)) { throw "Missing: $manifestPath" }

          [xml]$xml = Get-Content $manifestPath
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("vsix","http://schemas.microsoft.com/developer/vsx-schema/2011")

          $identity = $xml.SelectSingleNode("//vsix:Identity",$ns)
          if (-not $identity) { throw "Cannot find vsix:Identity node" }

          $metadata = $xml.SelectSingleNode("//vsix:Metadata",$ns)
          if (-not $metadata) { throw "Cannot find vsix:Metadata node" }

          if ($env:VSIX_ID_RC -notmatch '^\{[0-9a-fA-F-]{36}\}$') {
            throw "VSIX_ID_RC must be a GUID in braces, e.g. {11111111-2222-3333-4444-555555555555}"
          }

          $identity.SetAttribute("Id",$env:VSIX_ID_RC)
          $identity.SetAttribute("Publisher",$env:VS_MARKETPLACE_AUTHOR_DISPLAY_NAME)
          $identity.SetAttribute("Version","${{ needs.versioning.outputs.version }}")

          $displayName = $xml.SelectSingleNode("//vsix:Metadata/vsix:DisplayName",$ns)
          if ($displayName -and -not [string]::IsNullOrWhiteSpace($env:VSIX_DISPLAY_NAME_RC)) {
            $displayName.InnerText = $env:VSIX_DISPLAY_NAME_RC
          }

          $author = $xml.SelectSingleNode("//vsix:Metadata/vsix:Author",$ns)
          if (-not $author) {
            $author = $xml.CreateElement("Author",$ns.LookupNamespace("vsix"))
            [void]$metadata.AppendChild($author)
          }
          $author.InnerText = $env:VS_MARKETPLACE_AUTHOR_DISPLAY_NAME

          $xml.Save($manifestPath)

      - name: Patch VSIX manifest (PROD)
        if: inputs.channel == 'prod'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $manifestPath = "src/SlnxMermaidVsix/source.extension.vsixmanifest"
          if (-not (Test-Path $manifestPath)) { throw "Missing: $manifestPath" }

          [xml]$xml = Get-Content $manifestPath
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("vsix","http://schemas.microsoft.com/developer/vsx-schema/2011")

          $identity = $xml.SelectSingleNode("//vsix:Identity",$ns)
          if (-not $identity) { throw "Cannot find vsix:Identity node" }

          $metadata = $xml.SelectSingleNode("//vsix:Metadata",$ns)
          if (-not $metadata) { throw "Cannot find vsix:Metadata node" }

          $identity.SetAttribute("Publisher",$env:VS_MARKETPLACE_PUBLISHER_ID)
          $identity.SetAttribute("Version","${{ needs.versioning.outputs.version }}")

          $author = $xml.SelectSingleNode("//vsix:Metadata/vsix:Author",$ns)
          if (-not $author) {
            $author = $xml.CreateElement("Author",$ns.LookupNamespace("vsix"))
            [void]$metadata.AppendChild($author)
          }
          $author.InnerText = $env:VS_MARKETPLACE_AUTHOR_DISPLAY_NAME

          $xml.Save($manifestPath)

      - name: Restore
        run: msbuild SlnxMermaidVisualStudio.slnx /t:Restore /p:Configuration=Release

      - name: Build VSIX
        run: msbuild SlnxMermaidVisualStudio.slnx /t:Build /p:Configuration=Release /p:DeployExtension=false

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ inputs.channel }}-package
          path: src/SlnxMermaidVsix/bin/**/*.vsix

  publish:
    needs: build
    runs-on: windows-latest

    env:
      VS_MARKETPLACE_PUBLISHER_ID: SharpCode
      VS_MARKETPLACE_INTERNAL_NAME: ${{ inputs.channel == 'rc' && 'slnxmermaid-rc' || 'slnxmermaid' }}

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-${{ inputs.channel }}-package
          path: vsix

      - name: Locate VsixPublisher
        id: vsixpublisher
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere not found: $vswhere" }

          $installationPath = & $vswhere -latest -products * -property installationPath
          if ([string]::IsNullOrWhiteSpace($installationPath)) { throw "Visual Studio installation not found by vswhere" }

          $publisherPath = Join-Path $installationPath "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          if (-not (Test-Path $publisherPath)) { throw "VsixPublisher.exe not found: $publisherPath" }

          "path=$publisherPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create publish manifest
        id: publishmanifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $workspace = $env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspace)) {
            $workspace = (Get-Location).Path
          }

          $publishManifestPath = Join-Path -Path $workspace -ChildPath "publishManifest.json"

          $tags = @("mermaid","diagram")
          if ("${{ inputs.channel }}" -eq "rc") {
            $tags += "rc"
          }

          $obj = [ordered]@{
            '$schema'     = "http://json.schemastore.org/vsix-publish"
            categories    = @("Coding","Documentation")
            tags          = $tags
            identity      = @{ internalName = $env:VS_MARKETPLACE_INTERNAL_NAME }
            priceCategory = "free"
            publisher     = $env:VS_MARKETPLACE_PUBLISHER_ID
            repo          = "https://github.com/asienicki/slnx-mermaid"
            qna           = $true
            private       = $false
            overview      = "docs/vsix/GETTING_STARTED.md"
          }

          ($obj | ConvertTo-Json -Depth 10) | Set-Content -Path $publishManifestPath -Encoding utf8
          "path=$publishManifestPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "publishManifest.json created at: $publishManifestPath"

      - name: Publish to VS Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:VS_MARKETPLACE_TOKEN)) {
            throw "Missing VS_MARKETPLACE_TOKEN secret"
          }

          $vsixPath = (Get-ChildItem vsix -Filter *.vsix -Recurse | Select-Object -First 1).FullName
          if ([string]::IsNullOrWhiteSpace($vsixPath)) { throw "VSIX not found under ./vsix" }

          & "${{ steps.vsixpublisher.outputs.path }}" publish `
            -payload $vsixPath `
            -publishManifest "${{ steps.publishmanifest.outputs.path }}" `
            -personalAccessToken $env:VS_MARKETPLACE_TOKEN `
            -ignoreWarnings "VSIXValidatorWarning01,VSIXValidatorWarning02"

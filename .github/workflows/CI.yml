name: CI

on:
  push:
    branches:
      - master
      - "feature/**"
      - "fix/**"
      - "codex/**"
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  CI-build-linux-net10:
    uses: ./.github/workflows/CI-build-linux-net10.yml

  CI-dotnet-format:
    uses: ./.github/workflows/CI-dotnet-format.yml

  CI-configuration-schema:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/CI-configuration-schema.yml

  CI-sample-configuration-schema:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/CI-sample-configuration-schema.yml

  CI-sample-configuration-coverage:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/CI-sample-configuration-coverage.yml

  CI-check-mermaid:
    needs: CI-build-linux-net10
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ./.github/workflows/CI-check-mermaid.yml
    secrets: inherit

  CI-vsix-build:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/CI-vsix-build.yml

  CI-sonar:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: CI-build-linux-net10
    uses: ./.github/workflows/CI-sonar.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  CI-license-check:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ./.github/workflows/CI-license-check.yml
    secrets: inherit

  CI-nuget-vulnerability-check:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ./.github/workflows/CI-nuget-vulnerability-check.yml
    secrets: inherit

  CI-codeql:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/CI-codeql.yml

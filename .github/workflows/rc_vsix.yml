name: RC VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - rc
    paths:
      - "src/SlnxMermaidVsix/**"
      - "SlnxMermaidVisualStudio.slnx"
      - ".github/workflows/rc_vsix.yml"
      - ".github/workflows/release_vsix.yml"

concurrency:
  group: rc-vsix-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Publish RC VSIX
    runs-on: windows-latest

    env:
      VSIX_BASE_VERSION: 17.1.0
      VS_MARKETPLACE_PUBLISHER_ID: SharpCode
      VS_MARKETPLACE_INTERNAL_NAME: slnxmermaid
      VS_MARKETPLACE_AUTHOR_DISPLAY_NAME: "Sharp Code"

    steps:
      # =========================
      # Versioning
      # =========================
      - name: Versioning - Calculate RC VSIX version
        id: version
        shell: pwsh
        run: |
          if ($env:VSIX_BASE_VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "VSIX_BASE_VERSION must have format Major.Minor.Build (numeric). Got: $env:VSIX_BASE_VERSION"
          }

          $now = Get-Date
          $yy  = $now.Year % 100
          $doy = $now.DayOfYear
          $run2 = [int]$env:GITHUB_RUN_NUMBER % 100

          # Match your existing Marketplace style: 26 046 01 => 2604601
          $revision = ($yy * 100000) + ($doy * 100) + $run2

          $version = "$env:VSIX_BASE_VERSION.$revision"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "Using RC VSIX version: $version"
          Write-Host "yy=$yy doy=$doy run2=$run2 revision=$revision"

      # =========================
      # Checkout & Tooling
      # =========================
      - name: Sources - Checkout
        uses: actions/checkout@v4

      - name: Tooling - Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # =========================
      # Patch VSIX manifest (Version + PublisherId + Author + Preview)
      # =========================
      - name: Manifests - Patch VSIX manifest for RC (Version/Publisher/Author/Preview)
        shell: pwsh
        run: |
          $manifestPath = "src/SlnxMermaidVsix/source.extension.vsixmanifest"

          [xml]$xml = Get-Content -Path $manifestPath
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("vsix", "http://schemas.microsoft.com/developer/vsx-schema/2011")

          $identity = $xml.SelectSingleNode("//vsix:Identity", $ns)
          if (-not $identity) { throw "Cannot find <Identity> in VSIX manifest." }

          $metadata = $xml.SelectSingleNode("//vsix:Metadata", $ns)
          if (-not $metadata) { throw "Cannot find <Metadata> in VSIX manifest." }

          # Publisher in VSIX must be publisherId (no spaces) for CLI publishing
          $identity.SetAttribute("Publisher", $env:VS_MARKETPLACE_PUBLISHER_ID)

          # Version must be monotonic; match Marketplace numbering scheme
          $identity.SetAttribute("Version", "${{ steps.version.outputs.version }}")

          # Author must match Marketplace publisher DISPLAY NAME exactly
          $author = $xml.SelectSingleNode("//vsix:Metadata/vsix:Author", $ns)
          if (-not $author) {
            $author = $xml.CreateElement("Author", $ns.LookupNamespace("vsix"))
            $author.InnerText = $env:VS_MARKETPLACE_AUTHOR_DISPLAY_NAME
            [void]$metadata.AppendChild($author)
          } else {
            $author.InnerText = $env:VS_MARKETPLACE_AUTHOR_DISPLAY_NAME
          }

          # Ensure Preview=true
          $preview = $xml.SelectSingleNode("//vsix:Metadata/vsix:Preview", $ns)
          if (-not $preview) {
            $preview = $xml.CreateElement("Preview", $ns.LookupNamespace("vsix"))
            $preview.InnerText = "true"
            [void]$metadata.AppendChild($preview)
          } else {
            $preview.InnerText = "true"
          }

          $xml.Save($manifestPath)

          Write-Host "Id: $($identity.GetAttribute('Id'))"
          Write-Host "Publisher: $($identity.GetAttribute('Publisher'))"
          Write-Host "Version: $($identity.GetAttribute('Version'))"
          Write-Host "Author: $($author.InnerText)"
          Write-Host "Preview: $($preview.InnerText)"

      # =========================
      # Restore & Build
      # =========================
      - name: Build - Restore (Release)
        run: msbuild SlnxMermaidVisualStudio.slnx /t:Restore /p:Configuration=Release

      - name: Build - Build VSIX (Release)
        run: msbuild SlnxMermaidVisualStudio.slnx /t:Build /p:Configuration=Release /p:DeployExtension=false

      # =========================
      # Locate VsixPublisher
      # =========================
      - name: Tooling - Locate VsixPublisher
        id: vsixpublisher
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          if (-not $installationPath) { throw "Unable to locate Visual Studio installation path." }

          $publisherPath = Join-Path $installationPath "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          if (-not (Test-Path $publisherPath)) { throw "VsixPublisher.exe not found at $publisherPath" }

          "path=$publisherPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # =========================
      # Create publish manifest (REQUIRED by VsixPublisher)
      # MUST match existing listing: SharpCode.slnxmermaid
      # =========================
      - name: Publishing - Create publish manifest (json)
        id: publishmanifest
        shell: pwsh
        run: |
          $publishManifestPath = Join-Path $env:GITHUB_WORKSPACE "publishManifest.json"

          $obj = @{
            '$schema'     = "http://json.schemastore.org/vsix-publish"
            categories    = @("Coding","Documentation")

            # Keep ONE short tag to avoid runner/tool bug (space-joined tag length > 50)
            tags          = @("mermaid")

            identity      = @{
              internalName = $env:VS_MARKETPLACE_INTERNAL_NAME
            }

            overview      = "README.md"
            priceCategory = "free"
            publisher     = $env:VS_MARKETPLACE_PUBLISHER_ID
          }

          ($obj | ConvertTo-Json -Depth 10) | Set-Content -Path $publishManifestPath -Encoding utf8
          "path=$publishManifestPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "publishManifest.json created at $publishManifestPath"
          Write-Host "publisher: $env:VS_MARKETPLACE_PUBLISHER_ID"
          Write-Host "internalName: $env:VS_MARKETPLACE_INTERNAL_NAME"

      # =========================
      # Publish
      # =========================
      - name: Publish - RC to Visual Studio Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          if (-not $env:VS_MARKETPLACE_TOKEN) { throw "Missing secret VS_MARKETPLACE_TOKEN" }

          $vsixPath = (Get-ChildItem -Path "src/SlnxMermaidVsix/bin" -Recurse -Filter "*.vsix" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1).FullName

          if (-not $vsixPath) {
            throw "VSIX package not found under src/SlnxMermaidVsix/bin"
          }

          Write-Host "Publishing VSIX: $vsixPath"

          $publisherPath       = "${{ steps.vsixpublisher.outputs.path }}"
          $publishManifestPath = "${{ steps.publishmanifest.outputs.path }}"

          $publishHelp = (& $publisherPath publish -? 2>&1 | Out-String)

          if ($publishHelp -match '(?m)^\s*-flags\b') {
            & $publisherPath publish `
              -payload $vsixPath `
              -publishManifest $publishManifestPath `
              -personalAccessToken $env:VS_MARKETPLACE_TOKEN `
              -flags Preview
          }
          else {
            Write-Warning "VsixPublisher on this runner does not support '-flags'. Publishing RC without Preview flag."
            & $publisherPath publish `
              -payload $vsixPath `
              -publishManifest $publishManifestPath `
              -personalAccessToken $env:VS_MARKETPLACE_TOKEN
          }
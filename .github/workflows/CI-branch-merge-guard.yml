name: CI-branch-merge-guard

on:
  workflow_call:

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Enforce branch merge rules
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          fail() {
            local message="$1"

            echo "❌ $message"

            gh api repos/$REPO/issues/$PR_NUMBER/comments \
              -f body="🚫 **Merge blocked**\n\n$message"

            exit 1
          }

          echo "PR from '$HEAD' to '$BASE'"

          case "$BASE" in

            master)
              if [[ "$HEAD" =~ ^feat/.* || "$HEAD" =~ ^fix/.* || "$HEAD" =~ ^codex/.* ]]; then
                exit 0
              fi
              fail "Into **master** allowed only from **feat/***, **fix/*** or **codex/***."
              ;;

            *)
              # For non-master targets we don't enforce merge naming restrictions.
              exit 0
              ;;

          esac

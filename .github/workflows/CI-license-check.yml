name: CI-license-check

on:
  workflow_call:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v6

      - name: 2. Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 3. Ensure tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl

      - name: 4. Restore
        run: dotnet restore SlnxMermaid.slnx

      - name: 5. Export dependency list
        run: |
          dotnet list SlnxMermaid.slnx package \
            --include-transitive \
            --format json > packages.json

      - name: 6. License compliance check (NuGet nuspec)
        shell: bash
        run: |
          set -euo pipefail

          read_policy_list() {
            local section=$1
            awk -v section="$section" '
              $0 == section ":" { in_section = 1; next }
              in_section && /^[^[:space:]]/ { exit }
              in_section && /^[[:space:]]*-[[:space:]]*/ {
                sub(/^[[:space:]]*-[[:space:]]*/, "")
                gsub(/^"|"$/, "")
                print
              }
            ' licenses/policy.yml
          }

          read_exception_key() {
            local package_name=$1
            local key=$2
            awk -v package_name="$package_name" -v key="$key" '
              function trim(value) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                return value
              }
              function unquote(value) {
                value = trim(value)
                gsub(/^"|"$/, "", value)
                return value
              }

              $0 == "exceptions:" { in_exceptions = 1; next }
              in_exceptions && /^[^[:space:]]/ { exit }
              in_exceptions && /^[[:space:]]{2}[^[:space:]].*:/ {
                current = trim($0)
                sub(/:.*/, "", current)
                in_package = (current == package_name)
                next
              }
              in_package && /^[[:space:]]{4}[^[:space:]].*:/ {
                current_key = trim($0)
                sub(/:.*/, "", current_key)
                if (current_key == key) {
                  value = $0
                  sub(/^[[:space:]]{4}[^:]+:[[:space:]]*/, "", value)
                  print unquote(value)
                  exit
                }
              }
            ' licenses/policy.yml
          }

          WHITELIST=$(read_policy_list whitelist)
          WARNLIST=$(read_policy_list warnlist)
          BLACKLIST=$(read_policy_list blacklist)

          mkdir -p .licenses
          RESULTS=".licenses/results.tsv"
          mkdir -p .licenses/tmp
          : > "$RESULTS"

          FAIL=0

          normalize() {
            echo "$1" | sed -E '
              s#https://licenses\.nuget\.org/MIT#MIT#I;
              s#https://licenses\.nuget\.org/Apache-2\.0#Apache-2.0#I;
              s#https://licenses\.nuget\.org/BSD-3-Clause#BSD-3-Clause#I;
              s#https://licenses\.nuget\.org/BSD-2-Clause#BSD-2-Clause#I;
              s#https://aka.ms/deprecateLicenseUrl#DEPRECATED_LICENSE_URL#I;
              s/ License//I;
              s/^Apache License 2.0$/Apache-2.0/I;
            ' | xargs
          }

          is_exception() {
            local name=$1
            local version=$2
            [[ "$(read_exception_key "$name" version)" == "$version" ]]
          }

          while IFS=$'\t' read -r NAME VERSION; do
            LICENSE=""

            echo "→ $NAME $VERSION"

            if is_exception "$NAME" "$VERSION"; then
              EX_LICENSE=$(read_exception_key "$NAME" license)
              EX_LICENSE=$(normalize "$EX_LICENSE")

              if echo "$BLACKLIST" | grep -qx "$EX_LICENSE"; then
                echo "::error::Exception violates blacklist: $NAME $VERSION ($EX_LICENSE)"
                echo -e "$NAME\t$VERSION\t$EX_LICENSE\tDISALLOWED" >> "$RESULTS"
                FAIL=1
              else
                echo "::notice::Exception applied for $NAME $VERSION ($EX_LICENSE)"
                echo -e "$NAME\t$VERSION\t$EX_LICENSE\tEXCEPTION" >> "$RESULTS"
              fi
              continue
            fi

            NUPKG=".licenses/$NAME.$VERSION.nupkg"
            TMP=".licenses/tmp/$NAME.$VERSION"
            mkdir -p "$TMP"

            URL="https://api.nuget.org/v3-flatcontainer/${NAME,,}/$VERSION/${NAME,,}.$VERSION.nupkg"

            if ! curl -fsSL "$URL" -o "$NUPKG"; then
              LICENSE="UNKNOWN"
            else
              unzip -qq -o "$NUPKG" '*.nuspec' -d "$TMP" || true
              NUSPEC=$(ls "$TMP"/*.nuspec 2>/dev/null | head -n 1)

              if [[ -z "${NUSPEC:-}" ]]; then
                LICENSE="UNKNOWN"
              else
                LICENSE=$(sed -nE 's:.*<(licenseExpression|license)>([^<]+)<.*:\2:p' "$NUSPEC")
                [[ -z "$LICENSE" ]] && LICENSE=$(sed -nE 's:.*<licenseUrl>([^<]+)<.*:\1:p' "$NUSPEC")
                LICENSE=${LICENSE:-UNKNOWN}
              fi
            fi

            rm -rf "$TMP"
            LICENSE=$(normalize "$LICENSE")
            echo "   license: $LICENSE"

            if [[ "$LICENSE" == "DEPRECATED_LICENSE_URL" ]]; then
              echo "::error::Unclassified dependency – deprecated licenseUrl used: $NAME $VERSION"
              echo -e "$NAME\t$VERSION\t$LICENSE\tUNCLASSIFIED" >> "$RESULTS"
              FAIL=1
              continue
            fi

            if [[ "$LICENSE" == "UNKNOWN" ]]; then
              echo "::error::Unclassified dependency – missing license: $NAME $VERSION"
              echo -e "$NAME\t$VERSION\t$LICENSE\tUNCLASSIFIED" >> "$RESULTS"
              FAIL=1
              continue
            fi

            if echo "$BLACKLIST" | grep -qx "$LICENSE"; then
              echo "::error::Disallowed license detected: $NAME ($LICENSE)"
              echo -e "$NAME\t$VERSION\t$LICENSE\tDISALLOWED" >> "$RESULTS"
              FAIL=1
            elif echo "$WARNLIST" | grep -qx "$LICENSE"; then
              echo "::warning::Conditionally allowed license: $NAME ($LICENSE)"
              echo -e "$NAME\t$VERSION\t$LICENSE\tCONDITIONALLY_ALLOWED" >> "$RESULTS"
            elif ! echo "$WHITELIST" | grep -qx "$LICENSE"; then
              echo "::error::Non-compliant license (not classified): $NAME ($LICENSE)"
              echo -e "$NAME\t$VERSION\t$LICENSE\tUNCLASSIFIED" >> "$RESULTS"
              FAIL=1
            else
              echo "   ✅ compliant"
              echo -e "$NAME\t$VERSION\t$LICENSE\tOK" >> "$RESULTS"
            fi

          done < <(
            jq -r '
              .projects[]?
              | .frameworks[]?
              | (.topLevelPackages[]?, .transitivePackages[]?)
              | [.id, .resolvedVersion] | @tsv
            ' packages.json | sort -u
          )

          exit $FAIL

      - name: 7. Build PR comment
        if: always() && github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          RESULTS=".licenses/results.tsv"

          echo "## 📜 License Compliance Report" > comment.md

          # ❌ Non-compliant / Unclassified
          if awk -F'\t' '$4=="DISALLOWED" || $4=="UNCLASSIFIED" {exit 1}' "$RESULTS"; then
            :
          else
            echo "" >> comment.md
            echo "### ❌ Non-compliant / Unclassified" >> comment.md
            awk -F'\t' '$4=="DISALLOWED" || $4=="UNCLASSIFIED" {printf "- **%s** %s — %s\n",$1,$2,$3}' \
              "$RESULTS" >> comment.md
          fi

          # 🟦 Exceptions applied
          if awk -F'\t' '$4=="EXCEPTION" {exit 1}' "$RESULTS"; then
            :
          else
            echo "" >> comment.md
            echo "### 🟦 Exceptions applied" >> comment.md
            awk -F'\t' '$4=="EXCEPTION" {printf "- **%s** %s — %s\n",$1,$2,$3}' \
              "$RESULTS" >> comment.md
          fi

          # ⚠️ Conditionally Allowed
          if awk -F'\t' '$4=="CONDITIONALLY_ALLOWED" {exit 1}' "$RESULTS"; then
            :
          else
            echo "" >> comment.md
            echo "### ⚠️ Conditionally Allowed" >> comment.md
            awk -F'\t' '$4=="CONDITIONALLY_ALLOWED" {printf "- **%s** %s — %s\n",$1,$2,$3}' \
              "$RESULTS" >> comment.md
          fi

          # ✅ Summary (by license) – zawsze ma sens
          echo "" >> comment.md
          echo "### ✅ Summary (by license)" >> comment.md
          awk -F'\t' '{print $3}' "$RESULTS" \
            | sort | uniq -c | sort -nr \
            | awk '{printf "- **%s**: %s deps\n",$2,$1}' >> comment.md

      - name: 8. Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

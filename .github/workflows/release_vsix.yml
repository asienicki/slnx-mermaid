name: Release VSIX

on:
  push:
    branches:
      - release
    paths:
      - 'src/SlnxMermaidVsix/**'
      - 'SlnxMermaidVisualStudio.slnx'
      - '.github/workflows/rc_vsix.yml'
      - '.github/workflows/release_vsix.yml'

concurrency:
  group: release-vsix-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest

    env:
      VSIX_BASE_VERSION: 17.1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Calculate release VSIX version
        id: version
        shell: pwsh
        run: |
          if ($env:VSIX_BASE_VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "VSIX_BASE_VERSION must have format Major.Minor.Build (numeric). Got: $env:VSIX_BASE_VERSION"
          }

          $baseParts = $env:VSIX_BASE_VERSION.Split('.') | ForEach-Object { [int]$_ }
          foreach ($part in $baseParts) {
            if ($part -lt 0 -or $part -gt 65535) {
              throw "VSIX_BASE_VERSION segment out of range (0-65535): $part"
            }
          }

          $dayOfYear = (Get-Date).DayOfYear
          $run2 = [int]$env:GITHUB_RUN_NUMBER % 100
          $revision = ($dayOfYear * 100) + $run2
          if ($revision -gt 65535) {
            throw "Calculated revision out of range (0-65535): $revision"
          }

          $versionFromTag = $null
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME) {
            $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
            if ($tagVersion -match '^\d+\.\d+\.\d+\.\d+$') {
              $versionFromTag = $tagVersion
            }
            elseif ($tagVersion -match '^\d+\.\d+\.\d+$') {
              $versionFromTag = "$tagVersion.$revision"
            }
          }

          $version = if ($versionFromTag) { $versionFromTag } else { "$env:VSIX_BASE_VERSION.$revision" }
          [void][version]$version

          $segments = $version.Split('.') | ForEach-Object { [int]$_ }
          foreach ($segment in $segments) {
            if ($segment -lt 0 -or $segment -gt 65535) {
              throw "Version segment out of range (0-65535): $segment"
            }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "Using release VSIX version: $version"

      - name: Update VSIX manifest version
        shell: pwsh
        run: |
          $manifestPath = "src/SlnxMermaidVsix/source.extension.vsixmanifest"

          [xml]$xml = Get-Content -Path $manifestPath
          $namespaceManager = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $namespaceManager.AddNamespace("vsix", "http://schemas.microsoft.com/developer/vsx-schema/2011")

          $identity = $xml.SelectSingleNode("//vsix:Identity", $namespaceManager)
          if (-not $identity) {
            throw "Cannot find <Identity> in VSIX manifest."
          }

          $identity.SetAttribute("Version", "${{ steps.version.outputs.version }}")
          $xml.Save($manifestPath)

      - name: Restore
        run: msbuild SlnxMermaidVisualStudio.slnx /t:Restore

      - name: Build VSIX
        run: msbuild SlnxMermaidVisualStudio.slnx /p:Configuration=Release

      - name: Locate VsixPublisher
        id: vsixpublisher
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          if (-not $installationPath) {
            throw "Unable to locate Visual Studio installation path."
          }

          $publisherPath = Join-Path $installationPath "VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe"
          if (-not (Test-Path $publisherPath)) {
            throw "VsixPublisher.exe not found at $publisherPath"
          }

          "path=$publisherPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish release to Visual Studio Marketplace
        shell: pwsh
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          if (-not $env:VS_MARKETPLACE_TOKEN) {
            throw "Missing secret VS_MARKETPLACE_TOKEN"
          }

          $vsixPath = (Get-ChildItem -Path "src/SlnxMermaidVsix/bin/Release" -Filter "SlnxMermaidVsix*.vsix" | Select-Object -First 1).FullName
          if (-not $vsixPath) {
            throw "VSIX package not found in src/SlnxMermaidVsix/bin/Release"
          }

          & "${{ steps.vsixpublisher.outputs.path }}" publish `
            -payload $vsixPath `
            -personalAccessToken $env:VS_MARKETPLACE_TOKEN
